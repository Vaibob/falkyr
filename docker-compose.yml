# JobPilot local container. Serves the UI + API on http://localhost:3001.
#
#   docker compose up --build      # build and run
#   docker compose run --rm jobpilot npm run ingest   # seed / refresh jobs
#
# The SQLite DB persists in ./data. The career-ops repo (one level up) is mounted
# read-only so generation/strategy can read cv.md / profile.yml / article-digest.md.

services:
  jobpilot:
    build: .
    image: jobpilot:local
    container_name: jobpilot
    ports:
      # Published to 127.0.0.1 ONLY — never expose this to the LAN (it can submit
      # applications). Host port defaults to 3007 (3001 is often taken); override
      # with JOBPILOT_HOST_PORT. The container always serves on 3001 internally.
      - "127.0.0.1:${JOBPILOT_HOST_PORT:-3007}:3001"
    # Server-side secrets (CLERK_SECRET_KEY for API identity verification,
    # optionally CLAUDE_CODE_OAUTH_TOKEN) — read from the git-ignored root env
    # files on the HOST at compose time; never baked into the image.
    env_file:
      - path: ./.env
        required: false
      - path: ./.env.local
        required: false
    environment:
      CAREER_OPS_ROOT: /career-ops
      JOBPILOT_DB: /app/data/jobpilot.db
      LOG_LEVEL: info
      # Bind all interfaces INSIDE the container so the (loopback-published) port
      # map works; the loopback publish above keeps the real surface local.
      JOBPILOT_HOST: 0.0.0.0
      # Claude Code auth for in-container generation/intake. Set in a git-ignored
      # .env next to this file: CLAUDE_CODE_OAUTH_TOKEN=<from `claude setup-token`>.
      # YOUR token, YOUR machine, never committed — the loopback publish above is
      # what keeps it off the LAN. Empty -> AI features degrade honestly.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # The browser hits the PUBLISHED host port (default 3007), not the internal
      # 3001, so the Clerk token's azp is http://localhost:3007. The security
      # layer already derives this from the request Host; this makes the explicit
      # allowlist correct too (belt-and-suspenders). Tracks JOBPILOT_HOST_PORT.
      FALKYR_EXTRA_ORIGINS: "http://localhost:${JOBPILOT_HOST_PORT:-3007},http://127.0.0.1:${JOBPILOT_HOST_PORT:-3007}"
      # --- optional, off by default ---
      # APIFY_TOKEN: ""            # enables the dormant Dice/Apify ingest source
      # JOBPILOT_ALLOW_SUBMIT: ""  # leave UNSET: autofill/submit needs a host display anyway
    volumes:
      - ./data:/app/data                  # SQLite DB persists here
      - ../career-ops:/career-ops:ro      # grounding files, read-only
    restart: unless-stopped
